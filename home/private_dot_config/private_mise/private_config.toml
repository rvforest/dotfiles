[tools]
act = "latest"  # run github actions locally
actionlint = "latest"  # "lint" github actions
ast-grep = "latest"  # A CLI tool for code structural search
atuin = "latest"  # shell history
bat = "latest"  # improved cat
bat-extras = "latest"  # Extensions for bat (diff, grep, man, etc)
btop = "latest"  # improved top
choose = "latest"  # A human-friendly and fast alternative to cut
claude = "latest"  # Claude AI CLI client
claude-squad = "latest"  # Manage multiple AI terminal agents
colima = "latest"  # Container runtime
coreutils = "latest"  # GNU core utilities
copier = "latest"  # Project templating tool
delta = "latest"  # improved diff
difftastic = "latest"  # Structural diff tool for code
docker-cli = "latest"  # Docker command-line client
docker-compose = "latest"  # Orchestrate multi-container Docker applications
duckdb = "latest"  # Analytical DB for local files
duf = "latest"  # disk free. df alternative
eza = "latest"  # improved ls
fd = "latest"  # improved find
fzf = "latest"  # fuzzy matching
gemini-cli = "latest"  # Gemini AI CLI client
github-cli = "latest"  # GitHub CLI (gh)
jd = "latest"  # JSON diff
jnv = "latest"  # Interactive JSON filter using jq
neovim = "latest"  # Modern vim
node = "latest"  # node.js runtime
ripgrep = "latest"  # Fast text/code search
rust = "latest"  # Rust language
sd = "latest"  # sed alternative
shellcheck = "latest"  # Shell scriot linter
shfmt = "latest"  # Shell script formatter
uv = "latest"  # Python package manager
yamllint = "latest"  # yaml linter
yamlfmt = "latest"  # yaml formatter
yj = "latest"  # Convert between YAML, TOML, JSON, and HCL
yq = "latest"  # like jq for yaml
zellij = "latest"  # terminal workspace manager
zizmor = "latest"  # Static analysis for GitHub Actions
zoxide = "latest"  # a smarter cd command

# No ARM
# dust = "latest"  # disk usage. du alternative
# jc = "latest"  # JSON convert
# tlrc = "latest"  # tldr in rust


[settings]
experimental = true
idiomatic_version_file_enable_tools = []
lockfile = true
python.uv_venv_auto = true
